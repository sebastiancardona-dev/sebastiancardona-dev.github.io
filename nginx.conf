server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    # Shared ecosystem contract: /health gates deploys, /info feeds the Portal (project 06)
    location = /health {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    location = /info {
        default_type application/json;
        alias /usr/share/nginx/html/info.json;
    }

    # Hashed build assets are immutable — cache hard.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Single-page site: anchors resolve client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
